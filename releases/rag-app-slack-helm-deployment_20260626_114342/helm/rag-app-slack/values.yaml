# Default values for rag-app-slack Helm chart
# FTC AIE 1.1.1 Cluster Deployment

# Global settings
global:
  environment: production
  clusterName: "FTC-AIE-1.1.1"

# RAG App Deployment
ragApp:
  enabled: true
  replicaCount: 2
  
  image:
    repository: docker.io/library/rag-app
    tag: slack-integrated
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
    annotations: {}
  
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: rag-app.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  
  healthCheck:
    enabled: true
    livenessProbe:
      httpGet:
        path: /api/slack/stats
        port: 5001
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /api/slack/stats
        port: 5001
      initialDelaySeconds: 5
      periodSeconds: 5

# PostgreSQL Database
postgresql:
  enabled: true
  auth:
    username: postgres
    password: postgres123
    database: ragdb_slack
  
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClassName: "default"
  
  metrics:
    enabled: false

# Slack Integration Settings
slack:
  enabled: true
  botToken: "" # Set via --set slack.botToken=xoxb-...
  signingSecret: "" # Set via --set slack.signingSecret=...
  importLimit: 100
  importDays: 30

# Salesforce Configuration
salesforce:
  enabled: true
  username: "" # Set via --set salesforce.username=...
  password: "" # Set via --set salesforce.password=...
  securityToken: "" # Set via --set salesforce.securityToken=...
  clientId: ""
  clientSecret: ""

# Model Configuration
models:
  embeddingModel: "models/embedding/all-MiniLM-L6-v2"
  llmModel: "models/llama-2-7b-chat.Q4_K_M.gguf"
  embeddingDimension: 384

# PVC for Models (if not baked into image)
models:
  persistence:
    enabled: false
    size: 20Gi
    storageClassName: "default"
    mountPath: /app/models

# Logging
logging:
  level: INFO
  format: json

# Namespace
namespace: default

# Pod Security
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0

securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    drop:
      - ALL

# Node Selection
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service Account
serviceAccount:
  create: true
  name: rag-app-slack

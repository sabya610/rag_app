replicaCount: 1

image:
  repository: sabya610/rag-app
  tag: llama3.1-8b-q4-v8
  pullPolicy: IfNotPresent

# Init container image (used for wait-for-postgres)
initImage:
  repository: sabya610/busybox
  tag: "1.36"

service:
  type: ClusterIP
  port: 80

env:
  DB_HOST: ""
  DB_PORT: "5432"
  DB_NAME: "ragdb"
  DB_USER: "postgres"
  DB_PASS: "postgres"
  MODEL_PATH: "/app/rag_app/models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
  EMBEDDING_MODEL: "/app/rag_app/models/embedding/all-MiniLM-L6-v2"
  SFDC_ENABLED: "true"
  SF_URL: "https://hp.my.salesforce.com"
  SFDC_PRODUCT_QUEUE: "HPE Ezmeral"
  SFDC_PRODUCT_LINE: "CONT PLT SW (RM)"

# SFDC credentials (stored in a K8s Secret)
sfdc:
  # Auth Mode 1: Session ID
  sessionId: "00Dd0000000bUlK!ARAAQIvg_mcGxJbn8QeLUTHtBdK9Z0lN8EDlS.jAOjc55CMihI8076QzZwGHzjRvj3lwe_UKhJzBhLxSEHlLiIlayFeRJiZH"
  sessionIdFile: "/etc/sfdc/sid.txt"
  # Auth Mode 2: OAuth2
  clientId: ""
  clientSecret: ""
  username: ""
  password: ""
  securityToken: ""
  loginUrl: "https://login.salesforce.com"

resources:
  requests:
    memory: "24Gi"
    cpu: "2"
  limits:
    memory: "32Gi"
    cpu: "4"

# HTTP proxy for outbound access (e.g. Salesforce API)
proxy:
  httpProxy: "http://hpeproxy.its.hpecorp.net:80"
  httpsProxy: "http://hpeproxy.its.hpecorp.net:80"
  noProxy: "10.0.0.0/8,192.168.0.0/16,localhost,127.0.0.1,.hpecorp.net,.storage.hpecorp.net"

ingress:
  enabled: false
  host: rag.local

postgresql:
  enabled: true
  image:
    repository: sabya610/pgvector
    tag: latest
  storage: 5Gi
  username: postgres
  password: postgres
  database: ragdb

# Platform related options (EZUA BYOApp integration)
ezua:
  # VirtualService for EZUA application endpoint
  virtualService:
    endpoint: "rag-app.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"
  # SSO/Authorization via istio AuthorizationPolicy
  authorizationPolicy:
    namespace: "istio-system"
    providerName: "oauth2-proxy"
    matchLabels:
      istio: "ingressgateway"

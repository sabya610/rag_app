apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-app-slack.fullname" . }}
  labels:
    {{- include "rag-app-slack.labels" . | nindent 4 }}
  {{- with .Values.ragApp.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.ragApp.service.type }}
  ports:
    - port: {{ .Values.ragApp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rag-app-slack.selectorLabels" . | nindent 4 }}
